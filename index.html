    h1, h2 { text-align: center; }
    input, button, select { padding: 12px; border-radius: 8px; border: none; font-size: 16px; }
    input { width: calc(100% - 24px); margin: 10px 0 20px 0; }
    .blocos { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

    .alternativa { display: block; background: rgba(255, 255, 255, 0.15); padding: 12px; margin: 10px 0; border-radius: 8px; cursor: pointer; text-align: left; }

    .botao-proximo, .botao-voltar { width: 100%; background: #00c2ff; color: #06111f; font-weight: bold; cursor: pointer; margin-top: 15px; }
    .barra { width: 100%; height: 18px; background: rgba(255,255,255,0.2); border-radius: 20px; overflow: hidden; margin: 15px 0; }
    .progressoBarra { height: 100%; width: 0%; background: #00c2ff; }
    #progresso { text-align: center; font-weight: bold; }
    .resultado-caixa { text-align: center; font-size: 20px; }
    .pequeno { text-align: center; opacity: 0.85; }
    .aviso { background: rgba(255,255,255,0.12); padding: 12px; border-radius: 10px; text-align: center; margin: 10px 0; }
    @media (max-width: 600px) { .container { margin: 10px; padding: 20px; } .blocos { grid-template-columns: 1fr; } }
  </style>

function formatarTempo(segundos) {
  const minutos = Math.floor(segundos / 60);
  const resto = segundos % 60;
  if (minutos === 0) return resto + "s";
  return minutos + "min " + resto + "s";
}

function atualizarTempo() {
  const agora = Date.now();
  const segundos = Math.floor((agora - inicioTempo) / 1000);
  document.getElementById("tempo").innerText = "Tempo: " + formatarTempo(segundos);
}

function embaralhar(lista) {
  const copia = [...lista];
  for (let i = copia.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copia[i], copia[j]] = [copia[j], copia[i]];
  }
  return copia;
}

async function carregarConfiguracoes() {
  const status = document.getElementById("statusBlocos");
  status.innerText = "Carregando blocos...";

  try {
    const snapPerguntas = await db.collection("perguntasPersonalizadas").get();
    snapPerguntas.forEach(doc => {
      const p = doc.data();
      if (p.bloco && p.pergunta && Array.isArray(p.alternativas)) {
        todasPerguntas.push({
          bloco: p.bloco,
          pergunta: p.pergunta,
          alternativas: p.alternativas,
          correta: Number(p.correta || 0)
        });
      }
    });

    const snapBlocos = await db.collection("blocos").get();
    snapBlocos.forEach(doc => {
      blocosAtivos[doc.id] = doc.data().ativo !== false;
    });

    renderizarBotoesBlocos();
  } catch (erro) {
    console.error(erro);
    status.innerText = "Erro ao carregar blocos. Verifique o Firebase.";
  }
}

function renderizarBotoesBlocos() {
  const div = document.getElementById("listaBlocos");
  const status = document.getElementById("statusBlocos");
  div.innerHTML = "";

  const blocos = [...new Set(todasPerguntas.map(q => q.bloco))]
    .filter(bloco => blocosAtivos[bloco] !== false);

  if (blocos.length === 0) {
    status.innerText = "Nenhum bloco está ativo no momento.";
    return;
  }

  status.innerText = "Escolha um bloco ativo:";
  blocos.forEach((bloco, i) => {
    const botao = document.createElement("button");
    botao.className = "bloco-btn";
    botao.innerText = "Bloco " + (i + 1) + " - " + bloco;
    botao.onclick = () => iniciarQuiz(bloco);
    div.appendChild(botao);
  });
}

function iniciarBlocoAleatorio() {
  const blocos = [...new Set(todasPerguntas.map(q => q.bloco))]
    .filter(bloco => blocosAtivos[bloco] !== false);
  if (blocos.length === 0) { alert("Nenhum bloco está ativo no momento."); return; }
  const blocoSorteado = blocos[Math.floor(Math.random() * blocos.length)];
  iniciarQuiz(blocoSorteado);
}

function iniciarPerguntasAleatorias() {
  nomeJogador = document.getElementById("nome").value.trim();
  if (nomeJogador === "") { alert("Digite seu nome para começar o quiz."); return; }
  let quantidade = Number(document.getElementById("quantidadeAleatoria").value);
  if (!quantidade || quantidade < 1) { alert("Digite uma quantidade válida de perguntas."); return; }

  const perguntasAtivas = todasPerguntas.filter(q => blocosAtivos[q.bloco] !== false);
  if (perguntasAtivas.length === 0) { alert("Nenhuma pergunta ativa disponível."); return; }
  if (quantidade > perguntasAtivas.length) quantidade = perguntasAtivas.length;

  blocoAtual = "Perguntas aleatórias";
  perguntasDoBloco = embaralhar(perguntasAtivas).slice(0, quantidade);
  indice = 0; pontos = 0; respostasDetalhadas = [];
  iniciarTelaQuiz();
}

function iniciarQuiz(blocoEscolhido) {
  nomeJogador = document.getElementById("nome").value.trim();
  if (nomeJogador === "") { alert("Digite seu nome para começar o quiz."); return; }
  if (blocosAtivos[blocoEscolhido] === false) { alert("Esse bloco está desativado pelo administrador."); return; }

  blocoAtual = blocoEscolhido;
  perguntasDoBloco = todasPerguntas.filter(q => q.bloco === blocoEscolhido);
  if (perguntasDoBloco.length === 0) { alert("Esse bloco ainda não tem perguntas."); return; }

  indice = 0; pontos = 0; respostasDetalhadas = [];
  iniciarTelaQuiz();
}

function iniciarTelaQuiz() {
  inicioTempo = Date.now();
  clearInterval(intervaloTempo);
  intervaloTempo = setInterval(atualizarTempo, 1000);
  atualizarTempo();
  document.getElementById("inicio").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  mostrarPergunta();
}

function mostrarPergunta() {
  const q = perguntasDoBloco[indice];
  document.getElementById("bloco").innerText = blocoAtual === "Perguntas aleatórias" ? "Modo: Perguntas aleatórias | Tema: " + q.bloco : "Bloco: " + q.bloco;
  document.getElementById("progresso").innerText = "Pergunta " + (indice + 1) + " de " + perguntasDoBloco.length;
  document.getElementById("pergunta").innerText = q.pergunta;
  document.getElementById("progressoBarra").style.width = ((indice) / perguntasDoBloco.length) * 100 + "%";

  const div = document.getElementById("alternativas");
  div.innerHTML = "";
  for (let i = 0; i < q.alternativas.length; i++) {
    div.innerHTML += `<label class="alternativa"><input type="radio" name="resposta" value="${i}"> ${String.fromCharCode(65 + i)}) ${q.alternativas[i]}</label>`;
  }
}

function proximaPergunta() {
  const marcada = document.querySelector('input[name="resposta"]:checked');
  if (!marcada) { alert("Escolha uma alternativa antes de continuar."); return; }

  const q = perguntasDoBloco[indice];
  const resposta = Number(marcada.value);
  const acertou = resposta === q.correta;
  if (acertou) pontos++;

  respostasDetalhadas.push({
    pergunta: q.pergunta,
    bloco: q.bloco,
    respostaMarcada: q.alternativas[resposta],
    respostaCorreta: q.alternativas[q.correta],
    acertou: acertou
  });

  indice++;
  if (indice < perguntasDoBloco.length) mostrarPergunta();
  else mostrarResultado();
}

function mostrarResultado() {
  clearInterval(intervaloTempo);
  const tempoFinal = Math.floor((Date.now() - inicioTempo) / 1000);
  document.getElementById("quiz").style.display = "none";
  document.getElementById("resultado").style.display = "block";
  document.getElementById("progressoBarra").style.width = "100%";
  salvarResultado(nomeJogador, blocoAtual, pontos, perguntasDoBloco.length, tempoFinal);

  let mensagem = pontos >= 9 ? "Excelente!" : pontos >= 6 ? "Muito bom!" : "Continue praticando!";
  document.getElementById("textoResultado").innerText = nomeJogador + ", você acertou " + pontos + " de " + perguntasDoBloco.length + " perguntas. Tempo total: " + formatarTempo(tempoFinal) + ".";
  document.getElementById("mensagemResultado").innerText = mensagem;
}

async function salvarResultado(nome, bloco, acertos, total, tempoSegundos) {
  const agora = new Date();
  try {
    await db.collection("resultados").add({
      nome, bloco, acertos, total,
      porcentagem: Math.round((acertos / total) * 100),
      tempo: formatarTempo(tempoSegundos),
      tempoSegundos,
      horario: agora.toLocaleString("pt-BR"),
      criadoEm: agora.toISOString(),
      respostas: respostasDetalhadas
    });
  } catch (erro) {
    alert("Erro ao salvar no Firebase. Verifique a internet e as regras do Firestore.");
    console.error(erro);
  }
}

function reiniciar() {
  clearInterval(intervaloTempo);
  indice = 0; pontos = 0; perguntasDoBloco = []; respostasDetalhadas = [];
  document.getElementById("resultado").style.display = "none";
  document.getElementById("inicio").style.display = "block";
}

window.iniciarQuiz = iniciarQuiz;
window.iniciarBlocoAleatorio = iniciarBlocoAleatorio;
window.iniciarPerguntasAleatorias = iniciarPerguntasAleatorias;
window.proximaPergunta = proximaPergunta;
window.reiniciar = reiniciar;
carregarConfiguracoes();
</script>
