let resultadosGlobais = [];
let blocosGlobais = [];
let perguntasGlobais = [];

function formatarTempo(segundos) { const m = Math.floor(segundos / 60); const s = segundos % 60; return m === 0 ? s + "s" : m + "min " + s + "s"; }
function limparTexto(txt) { return String(txt || "").replaceAll("<", "&lt;").replaceAll(">", "&gt;"); }

async function carregarTudo() { await carregarBlocosAdmin(); await carregarPerguntasAdmin(); await carregarResultados(); }

async function carregarBlocosAdmin() {
  const div = document.getElementById("controleBlocos");
  div.innerHTML = "Carregando...";
  const snapBlocos = await db.collection("blocos").get();
  const snapPerguntas = await db.collection("perguntas").get();

  const mapa = new Map();
  perguntasPadrao.forEach(q => mapa.set(q.bloco, { nome: q.bloco, ativo: true }));
  snapPerguntas.forEach(doc => { const b = doc.data().bloco; if (b) mapa.set(b, { nome: b, ativo: true }); });
  snapBlocos.forEach(doc => mapa.set(doc.id, { nome: doc.id, ativo: doc.data().ativo !== false }));
  blocosGlobais = [...mapa.values()].sort((a,b) => a.nome.localeCompare(b.nome));

  div.innerHTML = "";
  blocosGlobais.forEach(b => {
    div.innerHTML += `<div class="linha-bloco">
      <strong>${limparTexto(b.nome)}</strong>
      <span>${b.ativo ? "Ativo" : "Desativado"}</span>
      <button onclick="alterarBloco('${b.nome.replaceAll("'", "\'")}', ${!b.ativo})">${b.ativo ? "Desativar" : "Ativar"}</button>
      <button class="danger" onclick="excluirBloco('${b.nome.replaceAll("'", "\'")}')">Excluir</button>
    </div>`;
  });
  atualizarSelectsBlocos();
}

function atualizarSelectsBlocos() {
  const selects = [document.getElementById("blocoPergunta"), document.getElementById("filtroBloco")];
  selects.forEach(sel => { sel.innerHTML = ""; });
  document.getElementById("filtroBloco").innerHTML = `<option value="todos">Todas as perguntas</option>`;
  blocosGlobais.forEach(b => {
    document.getElementById("blocoPergunta").innerHTML += `<option value="${limparTexto(b.nome)}">${limparTexto(b.nome)}</option>`;
    document.getElementById("filtroBloco").innerHTML += `<option value="${limparTexto(b.nome)}">${limparTexto(b.nome)}</option>`;
  });
}

async function adicionarBloco() {
  const nome = document.getElementById("novoBloco").value.trim();
  if (!nome) { alert("Digite o nome do bloco."); return; }
  await db.collection("blocos").doc(nome).set({ ativo: true, criadoEm: new Date().toISOString() });
  document.getElementById("novoBloco").value = "";
  await carregarBlocosAdmin();
}

async function alterarBloco(bloco, novoStatus) {
  await db.collection("blocos").doc(bloco).set({ ativo: novoStatus }, { merge: true });
  await carregarBlocosAdmin();
}

async function excluirBloco(bloco) {
  if (!confirm("Excluir o bloco '" + bloco + "' e todas as perguntas dele?")) return;
  const snap = await db.collection("perguntas").where("bloco", "==", bloco).get();
  const batch = db.batch();
  snap.forEach(doc => batch.delete(doc.ref));
  batch.delete(db.collection("blocos").doc(bloco));
  await batch.commit();
  await carregarTudo();
}

async function adicionarPergunta() {
  const bloco = document.getElementById("blocoPergunta").value;
  const pergunta = document.getElementById("novaPergunta").value.trim();
  const alternativas = [0,1,2,3].map(i => document.getElementById("alt" + i).value.trim());
  const correta = Number(document.getElementById("correta").value);
  if (!bloco || !pergunta || alternativas.some(a => !a)) { alert("Preencha o bloco, a pergunta e as 4 alternativas."); return; }
  await db.collection("perguntas").add({ bloco, pergunta, alternativas, correta, criadoEm: new Date().toISOString() });
  document.getElementById("novaPergunta").value = "";
  [0,1,2,3].forEach(i => document.getElementById("alt" + i).value = "");
  await carregarPerguntasAdmin();
}

async function carregarPerguntasAdmin() {
  const div = document.getElementById("listaPerguntas");
  div.innerHTML = "Carregando perguntas...";
  let snap = await db.collection("perguntas").get();
  perguntasGlobais = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
  const filtro = document.getElementById("filtroBloco")?.value || "todos";
  let lista = perguntasGlobais;
  if (filtro !== "todos") lista = lista.filter(q => q.bloco === filtro);

  if (lista.length === 0) { div.innerHTML = "Nenhuma pergunta salva no Firebase ainda."; return; }
  div.innerHTML = "";
  lista.forEach(q => {
    div.innerHTML += `<div class="pergunta-card">
      <strong>${limparTexto(q.bloco)}</strong><br>
      <p>${limparTexto(q.pergunta)}</p>
      <ol type="A">
        <li>${limparTexto(q.alternativas?.[0])}</li><li>${limparTexto(q.alternativas?.[1])}</li><li>${limparTexto(q.alternativas?.[2])}</li><li>${limparTexto(q.alternativas?.[3])}</li>
      </ol>
      <p>Correta: ${String.fromCharCode(65 + Number(q.correta || 0))}</p>
      <button onclick="editarPergunta('${q.id}')">Editar</button>
      <button class="danger" onclick="excluirPergunta('${q.id}')">Excluir</button>
    </div>`;
  });
}

async function editarPergunta(id) {
  const q = perguntasGlobais.find(p => p.id === id);
  if (!q) return;
  const pergunta = prompt("Editar pergunta:", q.pergunta);
  if (pergunta === null) return;
  const alternativas = [];
  for (let i = 0; i < 4; i++) {
    const alt = prompt("Alternativa " + String.fromCharCode(65+i) + ":", q.alternativas[i]);
    if (alt === null) return;
    alternativas.push(alt);
  }
  const correta = Number(prompt("Número da correta: 0=A, 1=B, 2=C, 3=D", q.correta));
  if (![0,1,2,3].includes(correta)) { alert("Correta inválida."); return; }
  await db.collection("perguntas").doc(id).update({ pergunta, alternativas, correta });
  await carregarPerguntasAdmin();
}

async function excluirPergunta(id) {
  if (!confirm("Excluir esta pergunta?")) return;
  await db.collection("perguntas").doc(id).delete();
  await carregarPerguntasAdmin();
}

async function importarPerguntasPadrao() {
  if (!confirm("Importar as 100 perguntas padrão para o Firebase? Faça isso apenas uma vez.")) return;
  const batch = db.batch();
  perguntasPadrao.forEach(q => {
    const ref = db.collection("perguntas").doc();
    batch.set(ref, { ...q, criadoEm: new Date().toISOString() });
    batch.set(db.collection("blocos").doc(q.bloco), { ativo: true }, { merge: true });
  });
  await batch.commit();
  await carregarTudo();
  alert("Perguntas importadas.");
}

async function carregarResultados() {
  const status = document.getElementById("status"), div = document.getElementById("tabelaResultados"), resumo = document.getElementById("resumo");
  status.innerText = "Carregando resultados..."; div.innerHTML = ""; resumo.innerHTML = "";
  try {
    const snapshot = await db.collection("resultados").orderBy("criadoEm", "desc").get();
    resultadosGlobais = snapshot.docs.map(doc => doc.data());
    if (resultadosGlobais.length === 0) { status.innerText = "Nenhum resultado registrado ainda."; return; }
    let somaAcertos = 0, somaTempo = 0, somaPorcentagem = 0;
    resultadosGlobais.forEach(r => { somaAcertos += Number(r.acertos || 0); somaTempo += Number(r.tempoSegundos || 0); somaPorcentagem += Number(r.porcentagem || ((r.acertos || 0)/(r.total || 1))*100); });
    resumo.innerHTML = `<h2>Total: ${resultadosGlobais.length} | Média de acertos: ${(somaAcertos/resultadosGlobais.length).toFixed(1)} | Porcentagem média: ${Math.round(somaPorcentagem/resultadosGlobais.length)}% | Tempo médio: ${formatarTempo(Math.round(somaTempo/resultadosGlobais.length))}</h2>`;
    let tabela = `<table><tr><th>Horário</th><th>Nome</th><th>Bloco</th><th>Acertos</th><th>%</th><th>Tempo</th><th>Mais informações</th></tr>`;
    resultadosGlobais.forEach((r, i) => { tabela += `<tr><td>${limparTexto(r.horario)}</td><td>${limparTexto(r.nome)}</td><td>${limparTexto(r.bloco)}</td><td>${r.acertos || 0}/${r.total || 0}</td><td>${r.porcentagem || Math.round(((r.acertos||0)/(r.total||1))*100)}%</td><td>${limparTexto(r.tempo)}</td><td><button onclick="mostrarDetalhesResultado(${i})">Ver</button></td></tr>`; });
    tabela += "</table><div id='detalhesResultado'></div>";
    div.innerHTML = tabela;
    status.innerText = "Resultados carregados.";
  } catch (erro) { status.innerText = "Erro ao carregar resultados. Verifique as regras do Firestore."; console.error(erro); }
}

function mostrarDetalhesResultado(i) {
  const r = resultadosGlobais[i];
  const div = document.getElementById("detalhesResultado");
  if (!r.detalhes || r.detalhes.length === 0) { div.innerHTML = "<div class='aviso'>Esse resultado não tem detalhes salvos.</div>"; return; }
  let html = `<h3>Detalhes de ${limparTexto(r.nome)}</h3><table><tr><th>Pergunta</th><th>Resposta marcada</th><th>Resposta correta</th><th>Status</th></tr>`;
  r.detalhes.forEach(d => { html += `<tr><td>${limparTexto(d.pergunta)}</td><td>${limparTexto(d.respostaMarcada)}</td><td>${limparTexto(d.respostaCorreta)}</td><td>${d.acertou ? "Acertou" : "Errou"}</td></tr>`; });
  div.innerHTML = html + "</table>";
}

function baixarCSV() {
  if (resultadosGlobais.length === 0) { alert("Não há resultados para baixar."); return; }
  let csv = "Horario,Nome,Bloco,Acertos,Total,Porcentagem,Tempo
";
  resultadosGlobais.forEach(r => { csv += `"${r.horario || ""}","${r.nome || ""}","${r.bloco || ""}",${r.acertos || 0},${r.total || 0},${r.porcentagem || 0},"${r.tempo || ""}"
`; });
  const arquivo = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const link = document.createElement("a"); link.href = URL.createObjectURL(arquivo); link.download = "resultados_quiz.csv"; link.click();
}

window.carregarTudo = carregarTudo; window.baixarCSV = baixarCSV; window.adicionarBloco = adicionarBloco; window.alterarBloco = alterarBloco; window.excluirBloco = excluirBloco; window.adicionarPergunta = adicionarPergunta; window.carregarPerguntasAdmin = carregarPerguntasAdmin; window.editarPergunta = editarPergunta; window.excluirPergunta = excluirPergunta; window.importarPerguntasPadrao = importarPerguntasPadrao; window.mostrarDetalhesResultado = mostrarDetalhesResultado;
carregarTudo();
</script>
